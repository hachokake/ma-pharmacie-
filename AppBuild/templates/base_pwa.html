<!-- Version PWA de base.html - Ajout du support PWA sans modification du design -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Application de gestion de pharmacie professionnelle">
    <meta name="theme-color" content="#0d6efd">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hotel App">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    
    <title>{% block title %}Gestion Pharmacie{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Bouton d'installation PWA */
        #installButton {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(15, 118, 110, 0.4);
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }
        
        #installButton:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.6);
        }
        
        #installButton.show {
            display: flex;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        /* Notification d'installation réussie */
        .install-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            animation: slideInRight 0.5s ease;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .install-toast.show {
            display: block;
        }
        
        /* Badge "Installable" */
        .pwa-badge {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            animation: fadeInUp 0.6s ease;
        }
    </style>
    
    <!-- Contenu original du head de base.html -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Bouton d'installation PWA -->
    <button id="installButton" class="animate__animated">
        <i class="bi bi-download"></i>
        📲 Installer l'application
    </button>
    
    <!-- Toast de confirmation -->
    <div id="installToast" class="install-toast">
        <div class="d-flex align-items-center">
            <i class="bi bi-check-circle-fill text-success me-3" style="font-size: 2rem;"></i>
            <div>
                <h6 class="mb-0">Installation réussie !</h6>
                <small class="text-muted">L'application est maintenant installée</small>
            </div>
        </div>
    </div>

    <!-- Contenu original du body -->
    {% block content %}{% endblock %}

    <!-- Scripts Bootstrap originaux -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script PWA Installation -->
    <script>
        let deferredPrompt;
        const installButton = document.getElementById('installButton');
        const installToast = document.getElementById('installToast');

        // Détecter si l'application peut être installée
        window.addEventListener('beforeinstallprompt', (e) => {
            // Empêcher la mini-infobar par défaut sur mobile
            e.preventDefault();
            // Sauvegarder l'événement pour l'utiliser plus tard
            deferredPrompt = e;
            // Afficher le bouton d'installation
            installButton.classList.add('show');
            console.log('💡 Application installable détectée');
        });

        // Gérer le clic sur le bouton d'installation
        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) {
                console.log('❌ Pas de prompt d\'installation disponible');
                return;
            }

            // Afficher le prompt d'installation
            deferredPrompt.prompt();

            // Attendre la réponse de l'utilisateur
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`👍 Choix utilisateur: ${outcome}`);

            if (outcome === 'accepted') {
                console.log('✅ Installation acceptée');
                showInstallToast();
            } else {
                console.log('❌ Installation refusée');
            }

            // Réinitialiser le prompt
            deferredPrompt = null;
            installButton.classList.remove('show');
        });

        // Détecter quand l'application a été installée
        window.addEventListener('appinstalled', (e) => {
            console.log('🎉 Application installée avec succès');
            showInstallToast();
            installButton.classList.remove('show');
        });

        // Afficher le toast de confirmation
        function showInstallToast() {
            installToast.classList.add('show');
            setTimeout(() => {
                installToast.classList.remove('show');
            }, 4000);
        }

        // Enregistrer le Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/service-worker.js')
                    .then((registration) => {
                        console.log('✅ Service Worker enregistré:', registration.scope);
                        
                        // Vérifier les mises à jour toutes les heures
                        setInterval(() => {
                            registration.update();
                        }, 60 * 60 * 1000);
                    })
                    .catch((error) => {
                        console.log('❌ Échec enregistrement Service Worker:', error);
                    });

                // Gérer les mises à jour du Service Worker
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('🔄 Nouveau Service Worker actif');
                    // Optionnel : recharger la page pour appliquer les mises à jour
                    if (confirm('Une nouvelle version est disponible. Recharger ?')) {
                        window.location.reload();
                    }
                });
            });
        }

        // Détecter si l'app est lancée en mode standalone (installée)
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            console.log('📱 Application lancée en mode standalone');
            // Cacher le bouton d'installation si déjà installée
            installButton.style.display = 'none';
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
